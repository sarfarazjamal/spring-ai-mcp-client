spring.application.name=mcp-client

# ===============================
# OpenAI / Model
# ===============================
spring.ai.openai.api-key=${OPENAI_API_KEY:}

# ===============================
# Spring AI MCP Client (HTTP)
# ===============================
spring.ai.mcp.client.streamable-http.connections.demoServer.url=http://127.0.0.1:8080

# Set to true to run the startup demo prompt against OpenAI and the MCP server.
mcp.client.run-on-startup=false
